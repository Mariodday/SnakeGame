build.generated.sources.dir=${build.dir}/generated-sources
debug.modulepath=\
    ${run.modulepath}
debug.test.modulepath=\
    ${run.test.modulepath}
excludes=
includes=**
build.classes.excludes=**/*.java,**/*.form
javac.modulepath=\
    ../javafx-sdk-21.0.7/lib/javafx.base.jar:\
    ../javafx-sdk-21.0.7/lib/javafx.controls.jar:\
    ../javafx-sdk-21.0.7/lib/javafx.graphics.jar:\
    ../javafx-sdk-21.0.7/lib/javafx.fxml.jar:\
    ../javafx-sdk-21.0.7/lib/javafx.media.jar
javac.processormodulepath=
javac.test.modulepath=\
    ${javac.modulepath}
run.modulepath=\
    ${javac.modulepath}
run.test.modulepath=\
    ${javac.test.modulepath}
# ── Rutas ─────────────────────────────────────────────────────────────────────
src.dir=src
test.src.dir=test
build.dir=build
build.classes.dir=${build.dir}/classes
build.test.classes.dir=${build.dir}/test/classes
build.test.results.dir=${build.dir}/test/results
dist.dir=dist
dist.jar=${dist.dir}/SnakeGame.jar
dist.javadoc.dir=${dist.dir}/javadoc

# ── JavaFX SDK (ruta relativa al proyecto) ────────────────────────────────────
javafx.lib=../javafx-sdk-21.0.7/lib

# ── Classpath ─────────────────────────────────────────────────────────────────
javac.classpath=\
    ${javafx.lib}/javafx.base.jar:\
    ${javafx.lib}/javafx.controls.jar:\
    ${javafx.lib}/javafx.graphics.jar:\
    ${javafx.lib}/javafx.fxml.jar:\
    ${javafx.lib}/javafx.media.jar
javac.processorpath=${javac.classpath}
javac.test.classpath=${javac.classpath}:${build.classes.dir}
run.classpath=${javac.classpath}:${build.classes.dir}

# ── VM args para ejecutar con JavaFX ─────────────────────────────────────────
run.jvmargs=--module-path "${javafx.lib}" --add-modules javafx.controls,javafx.graphics

# ── Clase principal ───────────────────────────────────────────────────────────
main.class=serpiente.Principal

# ── Versión Java ──────────────────────────────────────────────────────────────
javac.source=17
javac.target=17
javac.compilerargs=

# ── Opciones generales ────────────────────────────────────────────────────────
debug.classpath=${run.classpath}
jar.compress=false
javadoc.additionalparam=
javadoc.author=false
javadoc.encoding=${source.encoding}
javadoc.noindex=false
javadoc.nonavbar=false
javadoc.notree=false
javadoc.private=false
javadoc.splitindex=true
javadoc.use=true
javadoc.version=false
javadoc.windowtitle=
source.encoding=UTF-8
